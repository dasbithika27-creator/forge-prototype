<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORGE — Procurement Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;background:#0a0d14}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#1e2530;border-radius:3px}
.nh:hover{background:#161c26!important}
.ch:hover{border-color:#f59e0b!important}
.rh:hover{background:#14191f}
.bh:hover{opacity:0.85}

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const {AreaChart,Area,LineChart,Line,BarChart,Bar,ComposedChart,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer}=Recharts;

// Icons
const Icon=({d,size=16,color="currentColor"})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
const HomeIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
const CartIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>;
const SearchIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
const ChevIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
const LayersIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
const ZapIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
const StarIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
const TrendIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>;
const BarIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
const FileIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>;
const CheckIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
const UsersIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>;
const LeafIcon=({size=15})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 22 16 8"/><path d="M3.47 12.53C2.5 10 2.17 7.38 2.5 4.86A16.32 16.32 0 0120 4.36c0 5.52-7.5 9.64-13 9.64-1.37 0-2.71-.22-3.97-.64"/></svg>;

const spendData=[{month:"Aug",spend:142,savings:18},{month:"Sep",spend:158,savings:24},{month:"Oct",spend:134,savings:21},{month:"Nov",spend:167,savings:31},{month:"Dec",spend:145,savings:28},{month:"Jan",spend:189,savings:42}];
const scope3Data=[{month:"Aug",scope3:18400,target:17000},{month:"Sep",scope3:17800,target:16800},{month:"Oct",scope3:16900,target:16600},{month:"Nov",scope3:16200,target:16400},{month:"Dec",scope3:15800,target:16200},{month:"Jan",scope3:15500,target:16000}];
const steelData=[{week:"W1",price:1320},{week:"W2",price:1298},{week:"W3",price:1275},{week:"W4",price:1247},{week:"W5",forecast:1230},{week:"W6",forecast:1215},{week:"W7",forecast:1228}];
const demandData=[{month:"Feb",steel:820,concrete:1200,plant:340},{month:"Mar",steel:1050,concrete:1800,plant:420},{month:"Apr",steel:980,concrete:2100,plant:510},{month:"May",steel:1240,concrete:1950,plant:480},{month:"Jun",steel:1380,concrete:2300,plant:590}];
const carbonData=[{month:"Aug",avoided:280},{month:"Sep",avoided:310},{month:"Oct",avoided:260},{month:"Nov",avoided:390},{month:"Dec",avoided:340},{month:"Jan",avoided:420}];
const projects=[
  {name:"HS2 Euston Station",budget:48200000,spent:31400000,carbon:2840,carbonTarget:3200,status:"On Track"},
  {name:"Hinkley Point C",budget:124000000,spent:98700000,carbon:7120,carbonTarget:7000,status:"Over Carbon"},
  {name:"Manchester Airport T2",budget:22700000,spent:9800000,carbon:890,carbonTarget:1400,status:"On Track"},
  {name:"Battersea Power Station",budget:18500000,spent:16200000,carbon:1240,carbonTarget:1200,status:"At Risk"}
];
const suppliers=[
  {name:"Tata Steel UK",price:1247,lead:"3 days",badge:"Preferred",badgeColor:"#4ade80",verified:true,saving:"12%",carbonGrade:"A",carbonColor:"#22c55e",scope3:0.42,riskLevel:"Low",riskColor:"#22c55e",bid:1247},
  {name:"Celsa Manufacturing",price:1189,lead:"5 days",badge:"Competitive",badgeColor:"#60a5fa",verified:true,saving:"17%",carbonGrade:"B",carbonColor:"#84cc16",scope3:0.61,riskLevel:"Medium",riskColor:"#f59e0b",bid:1189},
  {name:"British Steel Ltd",price:1312,lead:"2 days",badge:"Premium",badgeColor:"#f59e0b",verified:true,saving:"8%",carbonGrade:"B+",carbonColor:"#84cc16",scope3:0.55,riskLevel:"Low",riskColor:"#22c55e",bid:1312},
  {name:"Alliance Steel",price:1156,lead:"7 days",badge:"Best Price",badgeColor:"#f87171",verified:false,saving:"19%",carbonGrade:"D",carbonColor:"#ef4444",scope3:1.12,riskLevel:"High",riskColor:"#ef4444",bid:1156}
];
const approvals=[
  {id:"PO-2024-8840",item:"Structural Steel I-Beams - HS2 Euston",value:"284,500",by:"J. Mitchell",level:"L2",urgency:"High",uc:"#ef4444"},
  {id:"PO-2024-8839",item:"Ready-Mix Concrete - Manchester Airport",value:"67,200",by:"A. Patel",level:"L1",urgency:"Medium",uc:"#f59e0b"},
  {id:"PO-2024-8836",item:"Tower Crane Hire (12wks) - Hinkley",value:"156,000",by:"S. Chen",level:"L3",urgency:"High",uc:"#ef4444"},
  {id:"PO-2024-8831",item:"Electrical Cable (bulk) - Battersea",value:"43,800",by:"R. Thompson",level:"L1",urgency:"Low",uc:"#6b7280"}
];
const aiRecs=[
  {supplier:"Tata Steel UK",reason:"Best balance of price, carbon score (A), and on-time delivery for large-scale infrastructure projects",score:94,action:"Preferred for structural steel"},
  {supplier:"Aggregate Industries",reason:"Lowest Scope 3 intensity for concrete. Directly supports your 25% Scope 3 reduction target by 2030",score:88,action:"Recommended for all concrete"},
  {supplier:"Briggs Equipment",reason:"Strong delivery record on infrastructure. ISO 14001 certified plant hire",score:81,action:"Consider for plant hire"}
];
const TT={background:"#161c26",border:"1px solid #1e2530",borderRadius:"8px",color:"#e8eaf0",fontSize:"12px"};
const S=(obj)=>Object.entries(obj).map(([k,v])=>k.replace(/[A-Z]/g,c=>"-"+c.toLowerCase())+":"+v).join(";");

const navGroups=[
  {section:"OVERVIEW",items:[{id:"dashboard",label:"Dashboard",I:HomeIcon}]},
  {section:"COMMERCE",items:[{id:"marketplace",label:"Marketplace",I:LayersIcon},{id:"auction",label:"Live Auction",I:ZapIcon},{id:"procurement",label:"Procurement",I:CartIcon}]},
  {section:"INTELLIGENCE",items:[{id:"ai",label:"AI Recommendations",I:StarIcon},{id:"trends",label:"Price Trends",I:TrendIcon},{id:"forecast",label:"Demand Forecast",I:BarIcon}]},
  {section:"OPERATIONS",items:[{id:"projects",label:"Project Budgets",I:FileIcon},{id:"approvals",label:"Approvals",I:CheckIcon},{id:"suppliers",label:"Supplier Directory",I:UsersIcon}]},
  {section:"REPORTING",items:[{id:"sustainability",label:"Sustainability",I:LeafIcon}]}
];
const titles={dashboard:"Overview",marketplace:"Supplier Marketplace",auction:"Live Reverse Auction",procurement:"Procurement",ai:"AI Recommendations",trends:"Price Trends",forecast:"Demand Forecasting",projects:"Project Budgets",approvals:"Approval Workflow",suppliers:"Supplier Directory",sustainability:"Sustainability Report"};

function App(){
  const [tab,setTab]=useState("dashboard");
  const [cart,setCart]=useState(0);
  const [notif,setNotif]=useState(null);
  const [live,setLive]=useState(false);
  const [timer,setTimer]=useState(300);
  const [bids,setBids]=useState(suppliers.map(s=>({...s})));
  const [apr,setApr]=useState({});

  useEffect(()=>{
    if(!live)return;
    const id=setInterval(()=>{
      setTimer(t=>{if(t<=1){setLive(false);return 0;}return t-1;});
      if(Math.random()<0.3)setBids(p=>p.map(b=>b.verified?{...b,bid:Math.max(b.price*0.88,b.bid-Math.floor(Math.random()*14))}:b));
    },1000);
    return()=>clearInterval(id);
  },[live]);

  const notify=msg=>{setNotif(msg);setTimeout(()=>setNotif(null),2500);};
  const addCart=name=>{setCart(c=>c+1);notify(name+" added to order");};
  const sorted=[...bids].sort((a,b)=>a.bid-b.bid);
  const mins=Math.floor(timer/60),secs=timer%60;

  const btn=(label,onClick,bg="#f59e0b",color="#000",extra={})=>(
    <button className="bh" onClick={onClick} style={{background:bg,color,border:bg==="transparent"?"1px solid #1e2530":"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"Barlow",...extra}}>{label}</button>
  );
  const card=(children,extra={})=>(
    <div style={{background:"#0f1318",border:"1px solid #1e2530",borderRadius:12,padding:"18px 20px",marginBottom:12,...extra}}>{children}</div>
  );
  const badge=(label,color)=>(
    <span style={{padding:"2px 9px",borderRadius:20,fontSize:10,fontWeight:600,background:color+"22",color}}>{label}</span>
  );
  const initials=name=>name.split(" ").map(w=>w[0]).join("").slice(0,2);

  return(
    <div style={{display:"flex",height:"100vh",background:"#0a0d14",color:"#e8eaf0",fontFamily:"Barlow,sans-serif",overflow:"hidden"}}>
      {notif&&<div style={{position:"fixed",bottom:22,right:22,background:"#1a2f1a",border:"1px solid #4ade80",color:"#4ade80",padding:"11px 18px",borderRadius:10,fontSize:13,fontWeight:600,zIndex:9999,pointerEvents:"none"}}>✓ {notif}</div>}

      {/* SIDEBAR */}
      <div style={{width:228,background:"#0f1318",borderRight:"1px solid #1e2530",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"20px",borderBottom:"1px solid #1e2530"}}>
          <div style={{fontFamily:"Barlow Condensed",fontSize:26,fontWeight:800,letterSpacing:3,color:"#fff"}}>F<span style={{color:"#f59e0b"}}>O</span>RGE</div>
          <div style={{fontSize:9,color:"#4a5568",letterSpacing:2,textTransform:"uppercase",marginTop:2}}>Procurement Platform</div>
        </div>
        <div style={{flex:1,padding:"8px 10px",overflowY:"auto"}}>
          {navGroups.map(g=>(
            <div key={g.section}>
              <div style={{fontSize:9,color:"#374151",letterSpacing:2,padding:"12px 12px 5px",fontWeight:600}}>{g.section}</div>
              {g.items.map(({id,label,I})=>(
                <div key={id} className="nh" onClick={()=>setTab(id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,cursor:"pointer",marginBottom:2,fontSize:13,fontWeight:500,color:tab===id?"#f59e0b":"#6b7280",background:tab===id?"#1a2235":"transparent",borderLeft:tab===id?"2px solid #f59e0b":"2px solid transparent"}}>
                  <I/>{label}
                  {id==="approvals"&&<span style={{marginLeft:"auto",background:"#ef4444",color:"#fff",borderRadius:10,fontSize:10,fontWeight:700,padding:"1px 6px"}}>4</span>}
                  {id==="auction"&&<span style={{marginLeft:"auto",width:7,height:7,background:"#22c55e",borderRadius:"50%",display:"inline-block",animation:"pulse 1.5s infinite"}}/>}
                </div>
              ))}
            </div>
          ))}
        </div>
        <div style={{padding:"12px 10px",borderTop:"1px solid #1e2530"}}>
          <div style={{fontSize:10,color:"#4a5568",padding:"0 12px",marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Infrastructure Co.</div>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,background:"#161c26"}}>
            <div style={{width:32,height:32,background:"#f59e0b",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#000",fontSize:13,fontFamily:"Barlow Condensed",flexShrink:0}}>CW</div>
            <div><div style={{fontSize:12,fontWeight:600,color:"#e8eaf0"}}>Carol Williams</div><div style={{fontSize:10,color:"#4a5568"}}>Head of Procurement</div></div>
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{background:"#0f1318",borderBottom:"1px solid #1e2530",padding:"0 24px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{fontFamily:"Barlow Condensed",fontSize:20,fontWeight:700,letterSpacing:1}}>{titles[tab]}</div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{background:"#161c26",border:"1px solid #1e2530",borderRadius:8,padding:"7px 12px",display:"flex",alignItems:"center",gap:8,width:230}}>
              <SearchIcon/><input style={{background:"none",border:"none",outline:"none",color:"#e8eaf0",fontSize:13,width:"100%",fontFamily:"Barlow"}} placeholder="Search materials, suppliers..."/>
            </div>
            <div style={{position:"relative"}}>
              {btn(<span style={{display:"flex",alignItems:"center",gap:6}}><CartIcon size={13}/>Basket</span>,()=>notify("Opening basket"))}
              {cart>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:"50%",width:17,height:17,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",position:"absolute",top:-6,right:-6}}>{cart}</span>}
            </div>
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"22px 26px"}}>

          {/* DASHBOARD */}
          {tab==="dashboard"&&<div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
              {[["Annual Spend Managed","£1.8B","+2.4% vs target","#22c55e"],["Active Suppliers","2,497","+143 this quarter","#22c55e"],["YTD Savings","£42.3M","2.35% of total spend","#22c55e"],["Scope 3 Reduction YTD","-8.4%","Target: -25% by 2030","#3b82f6"]].map(([l,v,s,c],i)=>(
                <div key={i} style={{background:"#0f1318",border:"1px solid #1e2530",borderRadius:12,padding:"16px 18px"}}>
                  <div style={{fontSize:10,color:"#4a5568",textTransform:"uppercase",letterSpacing:1.5,marginBottom:7}}>{l}</div>
                  <div style={{fontFamily:"Barlow Condensed",fontSize:28,fontWeight:700,color:"#fff",marginBottom:3}}>{v}</div>
                  <div style={{fontSize:11,color:c}}>{s}</div>
                </div>
              ))}
            </div>
            <div style={{background:"linear-gradient(135deg,#071a0e,#0d2a10)",border:"1px solid #1a4a20",borderRadius:12,padding:"16px 22px",marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div>
                  <div style={{fontFamily:"Barlow Condensed",fontSize:13,fontWeight:700,color:"#4ade80",letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Sustainability Tracker — Net Zero Progress</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>96% of emissions are Scope 3 — FORGE tracks carbon at every purchase decision</div>
                </div>
                {btn("View Details",()=>setTab("sustainability"),"transparent","#e8eaf0")}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
                {[["Scope 1 & 2 Reduction",18,42],["Scope 3 Reduction (Supply Chain)",8.4,25],["Suppliers with Carbon Data",62,100]].map(([l,c,t],i)=>(
                  <div key={i}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:5}}><span style={{color:"#9ca3af"}}>{l}</span><span style={{color:"#4ade80",fontWeight:600}}>{c}% / {t}%</span></div>
                    <div style={{background:"#1a2f1a",borderRadius:4,height:6}}><div style={{width:((c/t)*100)+"%",height:"100%",background:"linear-gradient(90deg,#4ade80,#22c55e)",borderRadius:4}}/></div>
                    <div style={{fontSize:10,color:"#4a5568",marginTop:3}}>Target: 2030</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:14}}>
              {card(<><div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:600,letterSpacing:2,marginBottom:14,color:"#6b7280",textTransform:"uppercase"}}>Monthly Spend vs Savings (£M)</div>
                <ResponsiveContainer width="100%" height={160}>
                  <AreaChart data={spendData}>
                    <defs>
                      <linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#f59e0b" stopOpacity={0.25}/><stop offset="95%" stopColor="#f59e0b" stopOpacity={0}/></linearGradient>
                      <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#22c55e" stopOpacity={0.25}/><stop offset="95%" stopColor="#22c55e" stopOpacity={0}/></linearGradient>
                    </defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e2530"/><XAxis dataKey="month" stroke="#4a5568" tick={{fontSize:10,fill:"#4a5568"}}/><YAxis stroke="#4a5568" tick={{fontSize:10,fill:"#4a5568"}}/><Tooltip contentStyle={TT}/>
                    <Area type="monotone" dataKey="spend" stroke="#f59e0b" strokeWidth={2} fill="url(#gA)" name="Spend £M"/>
                    <Area type="monotone" dataKey="savings" stroke="#22c55e" strokeWidth={2} fill="url(#gB)" name="Savings £M"/>
                  </AreaChart>
                </ResponsiveContainer></>)}
              {card(<><div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:600,letterSpacing:2,marginBottom:14,color:"#6b7280",textTransform:"uppercase"}}>Quick Actions</div>
                {[["🟢 Live Auction active now","auction"],["🔴 4 POs need approval","approvals"],["🔵 AI has 3 recommendations","ai"],["🟡 Steel price falling — buy now?","trends"]].map(([l,d],i)=>(
                  <div key={i} className="rh" onClick={()=>setTab(d)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<3?"1px solid #1e2530":"none",cursor:"pointer"}}>
                    <div style={{flex:1,fontSize:12,fontWeight:500,color:"#e8eaf0"}}>{l}</div><ChevIcon/>
                  </div>
                ))}</>)}
            </div>
          </div>}

          {/* MARKETPLACE */}
          {tab==="marketplace"&&<div>
            <div style={{background:"linear-gradient(135deg,#1a2035,#1f2d1a)",border:"1px solid #2d4a2a",borderRadius:12,padding:"16px 20px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:15,fontWeight:600,color:"#e8eaf0",marginBottom:4}}>Live marketplace — 2,497 suppliers competing for your business</div><div style={{fontSize:12,color:"#6b7280"}}>Every supplier scored on price, carbon grade, and supply chain risk</div></div>
              {btn("Start Live Auction",()=>{setTab("auction");},"#22c55e")}
            </div>
            {suppliers.map((s,i)=>(
              <div key={i} className="ch" style={{background:"#0f1318",border:"1px solid #1e2530",borderRadius:12,padding:"16px 20px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:14,alignItems:"center"}}>
                  <div style={{width:42,height:42,background:"#1e2530",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Barlow Condensed",fontSize:15,fontWeight:800,color:"#f59e0b",flexShrink:0}}>{initials(s.name)}</div>

            <div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:600,letterSpacing:2,color:"#6b7280",textTransform:"uppercase",marginBottom:12}}>2. Supplier Carbon League Table</div>
            {card(<>
              {[{rank:"1st",name:"Tata Steel UK",grade:"A",color:"#22c55e",scope3:0.42,spend:"£38.4M",note:"Saves 312t CO2e/yr vs avg supplier",bar:90},{rank:"2nd",name:"British Steel Ltd",grade:"B+",color:"#84cc16",scope3:0.55,spend:"£29.1M",note:"Saves 204t CO2e/yr vs avg supplier",bar:75},{rank:"3rd",name:"Celsa Manufacturing",grade:"B",color:"#84cc16",scope3:0.61,spend:"£22.7M",note:"Saves 148t CO2e/yr vs avg supplier",bar:66},{rank:"4th",name:"Alliance Steel",grade:"D",color:"#ef4444",scope3:1.12,spend:"£11.2M",note:"2.2× more carbon than top supplier",bar:18}].map((s,i)=>(
                <div key={i} className="rh" style={{display:"flex",alignItems:"center",gap:14,padding:"12px 0",borderBottom:i<3?"1px solid #1e2530":"none"}}>
                  <div style={{fontFamily:"Barlow Condensed",fontSize:14,color:"#4a5568",width:28}}>{s.rank}</div>
                  <div style={{width:40,height:40,borderRadius:10,background:s.color+"22",border:"2px solid "+s.color,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Barlow Condensed",fontSize:14,fontWeight:800,color:s.color,flexShrink:0}}>{s.grade}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,color:"#e8eaf0",marginBottom:3}}>{s.name}</div>
                    <div style={{fontSize:10,color:"#6b7280",marginBottom:5}}>{s.note}</div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:200,background:"#161c26",borderRadius:3,height:5}}><div style={{width:s.bar+"%",height:"100%",background:s.color,borderRadius:3}}/></div><span style={{fontSize:11,fontWeight:700,color:s.color}}>{s.scope3} tCO2e/t</span></div>
                  </div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:600,color:"#e8eaf0"}}>{s.spend}</div><div style={{fontSize:10,color:"#6b7280"}}>annual spend</div></div>
                </div>
              ))}
            </>)}
            <div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:600,letterSpacing:2,color:"#6b7280",textTransform:"uppercase",marginBottom:12}}>3. Per-Project Carbon P&L</div>
            {card(<>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:4,paddingBottom:12,borderBottom:"1px solid #1e2530",marginBottom:12,fontSize:10,color:"#4a5568",textTransform:"uppercase",letterSpacing:1.5}}><span>Project</span><span>Budget</span><span>Emitted</span><span>Variance</span></div>
              {projects.map((p,i)=>{const v=p.carbon-p.carbonTarget,over=v>0,sc=p.status==="On Track"?"#22c55e":p.status==="At Risk"?"#f59e0b":"#ef4444";return(
                <div key={i} className="rh" style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:4,padding:"12px 0",borderBottom:i<projects.length-1?"1px solid #1e2530":"none",alignItems:"center"}}>
                  <div><div style={{fontSize:13,fontWeight:600,color:"#e8eaf0",marginBottom:3}}>{p.name}</div>{badge(p.status,sc)}</div>
                  <div style={{fontFamily:"Barlow Condensed",fontSize:18,fontWeight:700}}>{p.carbonTarget.toLocaleString()}t</div>
                  <div style={{fontFamily:"Barlow Condensed",fontSize:18,fontWeight:700,color:over?"#ef4444":"#4ade80"}}>{p.carbon.toLocaleString()}t</div>
                  <div style={{fontFamily:"Barlow Condensed",fontSize:18,fontWeight:700,color:over?"#ef4444":"#4ade80"}}>{over?"+":""}{v.toLocaleString()}t<div style={{fontSize:10,fontWeight:400,color:"#6b7280"}}>{over?"over":"under"}</div></div>
                </div>
              );})}
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:4,paddingTop:12,borderTop:"1px solid #1e2530",marginTop:4}}>
                <div style={{fontSize:12,fontWeight:700,color:"#6b7280",textTransform:"uppercase"}}>Total</div>
                <div style={{fontFamily:"Barlow Condensed",fontSize:18,fontWeight:800}}>{projects.reduce((a,p)=>a+p.carbonTarget,0).toLocaleString()}t</div>
                <div style={{fontFamily:"Barlow Condensed",fontSize:18,fontWeight:800}}>{projects.reduce((a,p)=>a+p.carbon,0).toLocaleString()}t</div>
                <div style={{fontFamily:"Barlow Condensed",fontSize:18,fontWeight:800,color:"#f59e0b"}}>+290t net</div>
              </div>
            </>)}
            <div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:600,letterSpacing:2,color:"#6b7280",textTransform:"uppercase",marginBottom:12}}>4. Carbon Savings from Greener Choices</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              {card(<><div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:600,letterSpacing:2,marginBottom:14,color:"#6b7280",textTransform:"uppercase"}}>Carbon Avoided — Grade A Suppliers (tCO2e)</div>
                <ResponsiveContainer width="100%" height={160}>
                  <BarChart data={carbonData}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e2530"/><XAxis dataKey="month" stroke="#4a5568" tick={{fontSize:10,fill:"#4a5568"}}/><YAxis stroke="#4a5568" tick={{fontSize:10,fill:"#4a5568"}}/><Tooltip contentStyle={TT}/>
                    <Bar dataKey="avoided" name="tCO2e avoided" fill="#4ade80" radius={[4,4,0,0]}/>
                  </BarChart>
                </ResponsiveContainer></>,{marginBottom:0})}
              {card(<><div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:600,letterSpacing:2,marginBottom:14,color:"#6b7280",textTransform:"uppercase"}}>Carbon vs Cost Trade-off</div>
                {[{choice:"Tata Steel over Alliance Steel",saved:"312t CO2e/yr",cost:"+£4,100/t",verdict:"Worth it",vc:"#4ade80"},{choice:"Aggregate Industries concrete",saved:"184t CO2e/yr",cost:"+£2.50/m3",verdict:"Worth it",vc:"#4ade80"},{choice:"Briggs Equipment plant hire",saved:"62t CO2e/yr",cost:"+£180/day",verdict:"Marginal",vc:"#f59e0b"}].map((d,i)=>(
                  <div key={i} style={{padding:"10px 0",borderBottom:i<2?"1px solid #1e2530":"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}><span style={{fontSize:12,fontWeight:600,color:"#e8eaf0"}}>{d.choice}</span>{badge(d.verdict,d.vc)}</div>
                    <div style={{display:"flex",gap:16,fontSize:11,color:"#6b7280"}}><span style={{color:"#4ade80"}}>↓ {d.saved}</span><span>Cost premium: {d.cost}</span></div>
                  </div>
                ))}
                <div style={{marginTop:12,padding:"10px 12px",background:"#0d2010",borderRadius:8,border:"1px solid #1a4020"}}>
                  <div style={{fontSize:11,color:"#4ade80",fontWeight:600,marginBottom:2}}>Total carbon avoided this year: 2,000t CO2e</div>
                  <div style={{fontSize:10,color:"#6b7280"}}>= removing 430 cars from the road — directly contributes to Scope 3 −25% target</div>
                </div></>,{marginBottom:0})}
            </div>
          </div>}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
